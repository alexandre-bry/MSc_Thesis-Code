[workspace]
authors = ["Alexandre Bry <alexandre.bry@ign.fr>"]
channels = ["conda-forge"]
name = "points_to_prints"
platforms = ["linux-64"]
version = "0.1.0"

[feature.general.dependencies]
entwine = ">=3.2.1,<4"
duckdb = ">=1.5.2,<2"

# [feature.general.pypi-dependencies]
# geoparquet-io = ">=0.8.0,<0.9"


[feature.python.dependencies]
python = ">=3.14.4,<3.15"
gdal = ">=3.12.3,<4"
httpx = ">=0.28.1,<0.29"
pdal = ">=2.10.0,<3"
pyproj = ">=3.7.2,<4"
tqdm = ">=4.67.3,<5"
typer = ">=0.24.1,<0.25"
matplotlib = ">=3.10.8,<4"
imageio-ffmpeg = ">=0.6.0,<0.7"
geopandas = ">=1.1.1,<2"
shapely = ">=2.1.1,<3"
pyarrow = ">=22.0.0,<23"

[feature.python.pypi-dependencies]
fastquadtree = ">=2.1.1, <3"

[feature.python.tasks]
py = { cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" PYTHONNOUSERSITE=1 python" }
py-run = { args = [
    "command", # Name of the command, currently either `lidarhd`, `edge_matching`, `roof`, or `metrics`
], cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" PYTHONNOUSERSITE=1 python -m python.{{ command }}.main", description = "Run a Python command with subcommands and arguments.\nThe available commands are: lidarhd, edge_matching, roof, metrics.\nTo run a command, use `pixi run py-run <command> -- <argument1> <argument2> ...`." }

[feature.cpp.dependencies]
just = ">=1.50.0,<2"
gdal = ">=3.12.3,<4"
pdal = ">=2.10.1,<3"
cgal = ">=6.0.1,<7"
libarrow-all = ">=22.0.0,<23"
cmake = ">=4.3.2,<5"
doxygen = ">=1.13.2,<2"
eigen = ">=3.4.0,<4"

[feature.cpp.tasks]
cpp = { args = [
    "command",
    { arg = "mode", "default" = "" },
], cmd = "cd \"$INIT_CWD\" && just {{ command }} {{ mode }}", description = "Run the C++ code of the project.\nYou can use `pixi run just --list` to get a list of available commands.\nYou need to transform from them `<name> <arg_1> ... <arg_n> *ARGS` into `pixi run <name> <arg_1> ... <arg_n> -- *ARGS`." }

[tasks]
traj-estimation = { cmd = "cd \"$INIT_CWD\" && $PIXI_PROJECT_ROOT/LiDARHD_Traj_Estimation/build/SensorLiDARHD", description = "Compute the trajectories of each flight line in a LAS file." }

[environments]
default = ["general", "cpp", "python"]

[dependencies]
pip = ">=26.0.1,<27"
