[workspace]
authors = ["Alexandre Bry <alexandre.bry@ign.fr>"]
channels = ["conda-forge"]
name = "points_to_prints"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
entwine = ">=3.2.1,<4"
duckdb = ">=1.5.1,<2"

[feature.python.dependencies]
python = ">=3.14.0,<4"
gdal = ">=3.12.1,<4"
httpx = ">=0.28.1,<0.29"
pdal = ">=2.9.3,<3"
pyproj = ">=3.7.2,<4"
tqdm = ">=4.67.2,<5"
typer = ">=0.21.1,<1"
matplotlib = ">=3.10.8,<4"
imageio-ffmpeg = ">=0.6.0,<0.7"

[feature.python.pypi-dependencies]
fastquadtree = ">=2.1.1, <3"

[feature.python.tasks]
py = { cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" python" }
py-run = { cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" python -m python.lidarhd.main" }
py-edge-run = { cmd = "cd \"$INIT_CWD\" && PYTHONPATH=\"$PIXI_PROJECT_ROOT\" python -m python.edge_matching.main" }

[feature.cpp.dependencies]
just = ">=1.46.0,<2"
gdal = ">=3.12.2,<4"
pdal = ">=2.9.3,<3"
cgal = ">=6.0.1,<7"
libarrow-all = ">=23.0.0,<24"
cmake = ">=4.2.3,<5"
doxygen = ">=1.13.2,<2"
eigen = ">=3.4.0,<4"

[feature.cpp.tasks]
cpp = { args = [
    "command",
    "mode",
], cmd = "cd \"$INIT_CWD\" && just {{ command }} {{ mode }}", description = "Run the C++ code of the project. You can use `pixi run just --list` to get a list of commands that you need to transform from `<name> <arg_1> ... <arg_n> *ARGS` into `pixi run <name> <arg_1> ... <arg_n> -- *ARGS`." }

[tasks]
traj-estimation = { cmd = "cd \"$INIT_CWD\" && $PIXI_PROJECT_ROOT/LiDARHD_Traj_Estimation/build/SensorLiDARHD", description = "Compute the trajectories of each flight line in a LAS file." }

[environments]
default = ["cpp", "python"]
